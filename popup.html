<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Tag Config</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            width: 300px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 16px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-size: 0.8125rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        #tagPreview {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 20px;
        }

        .tag-chip {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 500;
        }

        button {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 4px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        footer {
            margin-top: 8px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Configurar Tags</h3>
        <p>Separa los tags por comas (ej: [general], [codigo], [trabajo])</p>
        
        <textarea id="tagInput" placeholder="[general], [codigo]..."></textarea>
        
        <div id="tagPreview"></div>

        <button id="saveBtn">Guardar y Recargar</button>
        
        <footer>Tudex Networks &copy; 2026</footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
